<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Midterm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div>
            <h2>Welcome, <span id="displayUser"></span>!</h2>
        </div>
        <button id="logoutBtn">Logout</button>
    </nav>

    <div class="filter-section">
        <strong>Filter by Price: </strong>
        <input type="number" id="minPrice" placeholder="Min $">
        <input type="number" id="maxPrice" placeholder="Max $">
        <button id="filterBtn">Apply Filter</button>
    </div>

    <div class="container">
        <div id="product-grid"></div>

        <aside id="cart-sidebar">
            <h3>Your Cart</h3>
            <div id="cart-items"></div>
            <hr>
            <p><strong>Total: $<span id="cart-total">0.00</span></strong></p>
            <button id="checkout-btn">Checkout</button>
            <div id="checkout-status"></div>
        </aside>
    </div>
    
    <script type="module">
    import { getCurrentUser, logout } from './auth.js';
    import { 
        loadProducts, 
        addToCart, 
        updateQty, 
        removeFromCart, // Added this import
        handleCheckout 
    } from './shop.js';

    // 1. Security Check: Ensure user is logged in [cite: 42, 103]
    const user = getCurrentUser();

    if (!user) {
        alert("Access Denied! Please log in first.");
        window.location.href = "Login.html";
    } else {
        document.getElementById('displayUser').textContent = user.username;
        loadProducts(); // Load the min. 25 products from API [cite: 15, 78]
    }

    // 2. GLOBAL ACCESS: Attach functions to 'window' so HTML 'onclick' can see them
    // This is required because 'type="module"' keeps functions private by default.
    window.addToCart = addToCart;
    window.updateQty = updateQty;
    window.removeFromCart = removeFromCart; // Crucial for the Remove button [cite: 86]

    // 3. Event Listeners for Static Buttons
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('checkout-btn').addEventListener('click', handleCheckout);
    </script>
</body>
</html>
